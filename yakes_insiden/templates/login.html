<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SECURESYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --teal: #2AA5A5;
      --teal-hover: #228b8b;
      --dark-blue: #1C2D54;
      --coral: #EE6161;
      --bg-color: #EEF8FA;
      --text: #4a5568;
      --border: #e2e8f0;
      --font: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background-color: var(--bg-color);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Decorative Background Waves */
    .bg-waves {
      position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
      background: 
        radial-gradient(circle at 0% 0%, #ffffff 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, #e0f6f6 0%, transparent 50%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 2px, transparent 2px, transparent 50px),
        linear-gradient(120deg, #F0F9FB 0%, #E3F4F7 100%);
    }

    .container {
      display: flex; width: 100vw; height: calc(100vh - 60px); 
    }
    
    .left-panel {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      padding: 50px 50px 20px 80px;
      position: relative;
    }
    
    .welcome-text {
      color: var(--teal);
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 30px;
    }
    
    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .illustration img {
      max-width: 80%;
      max-height: 80%;
      object-fit: contain;
      /* Add a subtle drop shadow to illustration */
      filter: drop-shadow(0 20px 30px rgba(42, 165, 165, 0.15));
      border-radius: 20px;
    }

    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .form-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 20px;
      margin-top: -60px;
    }
    
    /* Logo CSS */
    .logo-container {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 40px;
      padding-left: 20px;
    }
    
    .shield-icon {
      width: 60px;
      height: 70px;
      margin-right: 18px;
      position: relative;
    }
    
    .logo-text-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .logo-main-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.1;
    }
    
    .logo-sub-text {
      font-size: 13px;
      color: #64748b;
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 18px;
      position: relative;
    }
    
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--teal);
      font-size: 18px;
      pointer-events: none;
    }
    
    .form-control {
      width: 100%;
      padding: 15px 15px 15px 48px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #1e293b;
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01);
    }
    .form-control:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(42, 165, 165, 0.15);
    }
    .form-control::placeholder {
      color: #a0aec0;
      font-weight: 400;
    }
    
    .toggle-pw {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #718096;
      cursor: pointer;
      font-size: 16px;
    }

    .captcha-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .captcha-display {
      flex: 1;
      background: #F1F5F9;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 8px;
      user-select: none;
      overflow: hidden;
      position: relative;
    }
    /* Simple scratch background for captcha */
    .captcha-display::after {
      content:''; position:absolute; top:0; left:0; right:0; bottom:0;
      background: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.03) 5px, rgba(0,0,0,0.03) 6px);
    }
    
    .captcha-input {
      flex: 1;
    }
    .captcha-input .form-control {
      padding-left: 15px; /* No icon */
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover {
      background: var(--teal-hover);
    }

    .alert-error {
      background: #fef2f2;
      color: #ef4444;
      border: 1px solid #fca5a5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      text-align: center;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0; width: 100%; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 60px;
      font-size: 12px; color: #64748b;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.5);
    }
    
    .footer-left { display: flex; align-items: center; }
    .footer-right { display: flex; align-items: center; gap: 30px; }
    .footer-item { display: flex; align-items: center; gap: 8px; }
    .footer-item i { color: var(--teal); font-size: 16px; }

    @media (max-width: 992px) {
      .container { flex-direction: column; height: auto; }
      .left-panel { display: none; }
      .right-panel { padding: 40px 20px; min-height: calc(100vh - 60px); }
      .footer { padding: 0 20px; flex-direction: column; justify-content: center; gap: 10px; height: auto; padding-top: 15px; padding-bottom: 15px; }
      .footer-right { gap: 15px; flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="bg-waves"></div>

<div class="container">
  <div class="left-panel">
    <div class="welcome-text">Hi, Selamat Datang di SECURESYS</div>
    <div class="illustration">
      <img src="{{ url_for('static', filename='img/illustration.png') }}" alt="SOC Dashboard Analyst">
    </div>
  </div>
  
  <div class="right-panel">
    <div class="form-wrapper">
      
      <!-- Shield Logo Custom SVG -->
      <div class="logo-container">
        <div class="shield-icon">
          <svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Shield Background -->
            <path d="M50 0L0 20V50C0 80 20 105 50 120C80 105 100 80 100 50V20L50 0Z" fill="var(--teal)" stroke="var(--teal)" stroke-width="2"/>
            <!-- Inner White Cutout -->
            <path d="M50 15L15 29V50C15 72 30 90 50 102C70 90 85 72 85 50V29L50 15Z" fill="white"/>
            <!-- Padlock -->
            <rect x="35" y="60" width="30" height="22" rx="4" fill="var(--teal)"/>
            <path d="M38 60V50C38 43 43.5 38 50 38C56.5 38 62 43 62 50V60" stroke="var(--teal)" stroke-width="6" stroke-linecap="round"/>
            <circle cx="50" cy="69" r="3" fill="white"/>
            <path d="M50 72V76" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="logo-text-group">
          <div class="logo-main-text">
            <span style="color: var(--teal)">SECU</span><span style="color: var(--dark-blue)">RE</span><span style="color: var(--coral)">SYS</span>
          </div>
          <div class="logo-sub-text">Security Response System</div>
        </div>
      </div>
      
      {% if error %}
      <div class="alert-error"><i class="fas fa-exclamation-circle mr-2"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="form-group">
          <i class="fas fa-address-card input-icon"></i>
          <input type="text" name="username" class="form-control" placeholder="Username" autocomplete="off" required autofocus>
        </div>
        
        <div class="form-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="pw-input" name="password" class="form-control" placeholder="Password" autocomplete="new-password" required>
          <i class="fas fa-eye-slash toggle-pw" id="pw-toggle"></i>
        </div>
        
        <div class="captcha-row">
          <div class="captcha-display">
            <!-- Simulated CAPTCHA -->
            <span style="color:#2563eb; font-style:italic; transform: translateY(-3px)">V</span>
            <span style="color:#dc2626; transform: rotate(-5deg)">2</span>
            <span style="color:#d97706; transform: rotate(8deg)">7</span>
            <span style="color:#db2777; transform: translateY(2px)">1</span>
          </div>
          <div class="captcha-input">
            <input type="text" class="form-control" placeholder="Masukan Captcha" required>
          </div>
        </div>
        
        <button type="submit" class="btn-submit">SIGN IN</button>
      </form>
      
    </div>
  </div>
</div>

<div class="footer">
  <div class="footer-left">
    Jl. Cilaki No.73, Citarum, Kec. Bandung Wetan, Kota Bandung, Jawa Barat 40115
  </div>
  <div class="footer-right">
    <div class="footer-item">
      <i class="fas fa-phone-alt"></i>
      <span>022 - 8252-6441 / TRO 350</span>
    </div>
    <div class="footer-item">
      <i class="fab fa-whatsapp" style="font-size: 18px;"></i>
      <span>0821 1566 7778</span>
    </div>
    <div class="footer-item">
      <i class="far fa-envelope"></i>
      <span>helpdesk_sisfo@yakestelkom.or.id</span>
    </div>
  </div>
</div>

<script>
  // Password visibility toggle
  const pwToggle = document.getElementById('pw-toggle');
  const pwInput = document.getElementById('pw-input');
  
  pwToggle.addEventListener('click', function() {
    if (pwInput.type === 'password') {
      pwInput.type = 'text';
      this.classList.remove('fa-eye-slash');
      this.classList.add('fa-eye');
    } else {
      pwInput.type = 'password';
      this.classList.remove('fa-eye');
      this.classList.add('fa-eye-slash');
    }
  });

  // Basic CAPTCHA validation simulation
  document.querySelector('form').addEventListener('submit', function(e) {
    const captchaVal = document.querySelector('.captcha-input input').value.trim().toLowerCase();
    if (captchaVal !== 'v271' && captchaVal !== 'v 2 7 1') {
      e.preventDefault();
      alert('Captcha salah. Silahkan masukan V 2 7 1');
    }
  });
</script>
</body>
</html>
